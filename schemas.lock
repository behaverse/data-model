# schemas.lock — which behaverse/schemas artifacts the BDM site fetches.
# Read by scripts/build_spec.py.
#
# We fetch the *current* field-definitions.json from the canonical schemas site. While the
# schemas evolve rapidly (and BDM is their only consumer), pins are unversioned and content
# hashes are omitted — the build simply tracks current. To freeze a release later, add a
# `field_definitions_sha256` under a pin and build_spec will verify it.
source:
  url_template: "https://behaverse.org/schemas/{name}/field-definitions.json"

# Human "full reference" link target on generated pages (the Docusaurus docs site).
docs_base_url: https://behaverse.org/schemas

pins:
  trial:
    version: v26.0608
  event:
    version: v26.0608
