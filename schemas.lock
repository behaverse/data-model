# schemas.lock — pinned behaverse/schemas artifacts for a reproducible BDM build.
# Read by scripts/build_spec.py. A BDM release (one per year) freezes this file.
#
# field-definitions.json is fetched from jsDelivr, pinned to a behaverse/schemas commit
# (immutable + CDN-cached) and verified against the content hash below. behaverse.org/schemas
# does not yet serve this artifact type; when its deploy publishes versioned
# field-definitions.json, switch `source.url_template` to that path and drop `ref`.
source:
  url_template: "https://cdn.jsdelivr.net/gh/behaverse/schemas@{ref}/{name}/field-definitions.json"
  ref: 2b31c8103c22959a06414c461a0f574c7be352c8   # behaverse/schemas main @ PR#8 merge

# Human "full reference" link target on generated pages (the Docusaurus docs site).
docs_base_url: https://behaverse.org/schemas

pins:
