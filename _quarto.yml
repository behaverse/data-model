project:
  type: website
  preview:
    port: 4321
  execute-dir: project
  resources:
    - "assets/**/*"

language:
  search-text-placeholder: Search

filters:
  - assets/filters/status-badge.lua

format:
  html:
    page-layout: article
    title-block-style: default
    abstract-title: " "
    grid:
      sidebar-width: 280px
    theme:
      - assets/css/theme.scss
    email-obfuscation: javascript
    toc: true
    toc-location: right
    toc-expand: true
    link-external-icon: false

website:
  title: "Behaverse Data Model"
  site-url: "https://behaverse.org/data-model/"
  google-analytics: "G-K2NP7Q9KGZ"
  back-to-top-navigation: true
  search:
    location: navbar
    type: overlay
  cookie-consent:
    type: implied
    style: simple
  repo-url: https://github.com/behaverse/data-model
  repo-actions: none

  page-footer:
    background: light
    left: "© 2026 [xCIT](https://xcit.org) · [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/)"
    right: "[Changelog](/changelog.qmd) · [GitHub](https://github.com/behaverse/data-model) · [Cookies](#){#open_preferences_center}"

  navbar:
    logo: assets/img/bdm-logo.svg
    logo-alt: "Behaverse Data Model"
    left:
      - text: "Why BDM"
        href: why/index.qmd
      - text: "Concepts"
        href: concepts/index.qmd
      - text: "Guides"
        href: guides/index.qmd
      - text: "Specification"
        href: spec/index.qmd
      - text: "Glossary"
        href: glossary/index.qmd
    right:
      - text: "Contribute"
        href: contribute.qmd
      - text: "About"
        href: about.qmd
      - icon: github
        href: https://github.com/behaverse/data-model/

  sidebar:
    - id: why
      style: docked
      collapse-level: 2
      contents:
        - why/index.qmd
        - why/ecosystem.qmd
        - why/roadmap.qmd
    - id: concepts
      contents:
        - concepts/index.qmd
        - concepts/design-process.qmd
        - concepts/behavioral-data.qmd
        - concepts/metadata.qmd
    - id: guides
      contents:
        - guides/index.qmd
        - section: "Start here"
          contents:
            - guides/1-getting-started.qmd
        - section: "How-to guides"
          contents:
            - guides/2-describe-your-dataset.qmd
            - guides/3-organize-your-data.qmd
            - guides/4-questionnaire-data.qmd
            - guides/5-software-integration.qmd
            - guides/16-ai-integration.qmd
    - id: spec
      contents:
        - spec/index.qmd
        - section: "Conventions"
          contents:
            - spec/conventions/index.qmd
            - spec/conventions/naming.qmd
            - spec/conventions/indexing.qmd
            - spec/conventions/units.qmd
            - spec/conventions/folder-structure.qmd
        - section: "Dataset"
          contents:
            - spec/dataset-cards.qmd
            - spec/studyflows.qmd
            - spec/instructions.qmd
            - spec/questionnaires.qmd
        - text: "Events"
          href: spec/event/index.qmd
        - section: "Trials"
          contents:
            - spec/trial/index.qmd
            - auto: spec/trial/*.qmd
        - text: "Models"
          href: spec/models/index.qmd
        - text: "Timeseries"
          href: spec/timeseries.qmd
        - section: "Extensions"
          contents:
            - spec/extensions/index.qmd
            - auto: spec/extensions/*.qmd
